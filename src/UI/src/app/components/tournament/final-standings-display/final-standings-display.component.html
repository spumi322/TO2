<div class="results-content" *ngIf="finalStandings.length > 0">

  <!-- Champion -->
  <div class="champion-section" *ngIf="champion">
    <div class="champion-crown">
      <i class="pi pi-trophy"></i>
      <span>Champion</span>
    </div>
    <app-team-badge [teamName]="champion.teamName" size="lg"></app-team-badge>
  </div>

  <!-- 2nd, 3rd, 4th -->
  <div class="podium-row" *ngIf="podiumStandings.length > 0">
    <div *ngFor="let s of podiumStandings" class="podium-card"
         [class.silver]="s.placement === 2"
         [class.bronze]="s.placement >= 3">
      <span class="podium-rank">{{ ordinal(s.placement) }}</span>
      <app-team-badge [teamName]="s.teamName" size="md"></app-team-badge>
    </div>
  </div>

  <!-- 5th+ grouped tiers -->
  <div class="lower-list" *ngIf="lowerTiers.length > 0">
    <div class="tier-group" *ngFor="let tier of lowerTiers">
      <div class="tier-label">{{ tier.label }}</div>
      <ng-container *ngIf="tier.label === 'Top 8'">
        <div class="tier-row" *ngFor="let s of tier.standings">
          <span class="tier-rank">#{{ s.placement }}</span>
          <app-team-badge [teamName]="s.teamName" size="xs"></app-team-badge>
        </div>
      </ng-container>
      <div class="tier-row tier-row-multi" *ngIf="tier.label !== 'Top 8'">
        <ng-container *ngFor="let s of tier.standings; let last = last">
          <app-team-badge [teamName]="s.teamName" size="xs"></app-team-badge>
          <span class="tier-sep" *ngIf="!last">·</span>
        </ng-container>
      </div>
    </div>
  </div>

</div>
