<table class="group-matches">
  <thead>
    <tr>
      <th>Team A</th>
      <th>Score</th>
      <th>Team B</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let match of matches; trackBy: trackByMatchId">
      <!-- Team A -->
      <td [ngClass]="{
            'winner': match.winnerId === match.teamAId,
            'loser': match.loserId === match.teamAId
          }">
        {{ getTeamName(match.teamAId) }}
      </td>

      <!-- Score -->
      <td [class.score-updating]="isUpdating[match.id]" class="score-cell">
        <ng-container *ngIf="!match.winnerId && !isUpdating[match.id] && !isGroupFinished; else scoreOnly">
          <button class="score-btn" (click)="updateMatchScore(match.id, match.teamAId)">+</button>
          <span class="score-text">{{ match.teamAWins }} - {{ match.teamBWins }}</span>
          <button class="score-btn" (click)="updateMatchScore(match.id, match.teamBId)">+</button>
        </ng-container>
        <ng-template #scoreOnly>{{ match.teamAWins }} - {{ match.teamBWins }}</ng-template>
      </td>

      <!-- Team B -->
      <td [ngClass]="{
            'winner': match.winnerId === match.teamBId,
            'loser': match.loserId === match.teamBId
          }">
        {{ getTeamName(match.teamBId) }}
      </td>
    </tr>
  </tbody>
</table>
